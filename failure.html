<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error - Vibhav's Kitchen</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400..700;1,400..700&family=Inter:wght@400;500;7Do+not+disturb;700&family=Playfair+Display:wght@700&family=Cormorant+Garamond:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary-color: #C09873; --primary-hover: #a98261; --background-color: #FAF7F2; --text-color: #333333; }
        body { font-family: 'Inter', sans-serif; background-color: var(--background-color); color: var(--text-color); }
        .font-lora { font-family: 'Lora', serif; }
        .font-playfair { font-family: 'Playfair Display', serif; }
        .font-cormorant { font-family: 'Cormorant Garamond', serif; }
    </style>
</head>
<body class="antialiased">
    <div class="flex flex-col items-center justify-center min-h-screen text-center px-6">
        <svg class="w-24 h-24 text-red-500 mb-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
        <h1 class="text-5xl font-cormorant text-[var(--text-color)]">Oops! Something went wrong.</h1>
        <p class="text-xl text-gray-600 mt-4">We couldn't send your message. Please try again later or contact us directly.</p>
        <a href="contact.html" style="background-color: var(--primary-color);" class="text-white py-3 px-8 rounded-full text-lg font-semibold hover:bg-[var(--primary-hover)] transition-colors mt-12">
            Try Again
        </a>
    </div>
</body>
</html>
